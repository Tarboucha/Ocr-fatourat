services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocr}
      POSTGRES_DB: ${POSTGRES_DB:-ocr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocr} -d ${POSTGRES_DB:-ocr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Broker only — no persistence needed.
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ocr:ocr@db:5432/ocr}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_OCR_PIPELINE: ${DEFAULT_OCR_PIPELINE:-rapidocr}
    volumes:
      - uploads:/data/uploads
    ports:
      - "8000:8000"
    # Apply migrations, then launch the API.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://ocr:ocr@db:5432/ocr}
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEFAULT_OCR_PIPELINE: ${DEFAULT_OCR_PIPELINE:-rapidocr}
      # Skip PaddleX's per-cold-start connectivity check to the model hosters.
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
    volumes:
      - uploads:/data/uploads
      # PaddleOCR 3.x caches downloaded models here; persist them across restarts.
      - ocr-models:/root/.paddlex
    # Same shared image source as backend; runs the Celery worker instead.

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  uploads:
  ocr-models:
